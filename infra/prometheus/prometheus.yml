global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "observability-demo"
    # Spring Boot actuator prometheus endpoint
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          # host.containers.internal — стандартный хост для Podman
          # Если не работает, замените на ваш реальный IP
          - host.containers.internal:8080
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "observability-demo"
